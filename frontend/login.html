<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SeeWise AI - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #050505;
    --surface-1: #0a0a0c;
    --surface-2: rgba(18, 18, 20, 0.7);
    --border: rgba(255, 255, 255, 0.1);
    --border-glow: rgba(6, 182, 212, 0.5);
    
    --text-primary: #ffffff;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    
    --neon-cyan: #06b6d4;
    --neon-cyan-dim: rgba(6, 182, 212, 0.15);
    --neon-red: #ef4444;

    --font-ui: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated Background */
  .bg-animation {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: -1;
    background: 
      radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08), transparent 50%),
      radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 50%);
    background-size: 200% 200%;
    animation: bgShift 15s ease infinite alternate;
  }
  @keyframes bgShift {
    0% { background-position: 0% 0%; }
    100% { background-position: 100% 100%; }
  }

  .grid-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: -1;
    background-image: 
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    transform: perspective(500px) rotateX(60deg) scale(2);
    transform-origin: center top;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 40px; }
  }

  /* Glassmorphism Card */
  .login-card {
    background: var(--surface-2);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
    animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }
  
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    opacity: 0.5;
  }

  @keyframes cardEntrance {
    0% { transform: translateY(40px) scale(0.95); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  
  .logo-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface-1);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px var(--neon-cyan-dim);
  }
  
  .logo {
    width: 32px;
    height: 32px;
    object-fit: contain;
  }

  .title {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
    text-align: center;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 4px;
    margin-bottom: 32px;
  }

  /* Form Elements */
  .form-group {
    margin-bottom: 20px;
    position: relative;
  }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    padding: 12px 16px;
    font-size: 14px;
    font-family: var(--font-mono);
    outline: none;
    transition: all 0.3s ease;
  }

  .form-input:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 0 3px var(--neon-cyan-dim);
  }

  .form-input::placeholder {
    color: var(--text-muted);
  }

  .password-toggle {
    position: absolute;
    right: 12px;
    top: 36px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .password-toggle:hover {
    color: var(--neon-cyan);
  }

  .password-toggle svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
  }

  /* Options Row */
  .options-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    font-size: 12px;
  }

  .remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-secondary);
  }

  .remember-me input {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: rgba(0, 0, 0, 0.5);
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
  }

  .remember-me input:checked {
    background: var(--neon-cyan);
    border-color: var(--neon-cyan);
  }

  .remember-me input:checked::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 5px;
    width: 4px;
    height: 8px;
    border: solid #000;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .forgot-link {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .forgot-link:hover {
    color: var(--neon-cyan);
  }

  /* Submit Button */
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--neon-cyan);
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-submit:hover {
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
    transform: translateY(-1px);
  }

  .btn-submit:active {
    transform: translateY(1px);
  }

  .btn-submit.loading .btn-text {
    opacity: 0;
  }

  .btn-submit.loading::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border: 2px solid #000;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spinner 0.6s linear infinite;
  }

  @keyframes spinner {
    to { transform: rotate(360deg); }
  }

  .error-msg {
    color: var(--neon-red);
    font-size: 13px;
    text-align: center;
    margin-top: 16px;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  
  .error-msg.visible {
    opacity: 1;
  }
  
  @media (max-width: 480px) {
    .login-card {
      margin: 20px;
      padding: 32px 24px;
    }
  }
</style>
</head>
<body>

<div class="bg-animation"></div>
<div class="grid-overlay"></div>

<div class="login-card">
  <div class="logo-container">
    <div class="logo-circle">
      <img src="assets/seewise_logo.png" alt="SeeWise" class="logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%2306b6d4\' stroke-width=\'2\'%3E%3Cpath d=\'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\'/%3E%3C/svg%3E'">
    </div>
  </div>
  
  <h1 class="title">SeeWise AI</h1>
  <div class="subtitle">INDUSTRIAL MONITORING PLATFORM</div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-input" placeholder="Enter Admin ID" required autocomplete="username">
    </div>
    
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      <button type="button" class="password-toggle" onclick="togglePassword()" title="Toggle Password Visibility">
        <svg id="eyeIcon" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>
    
    <div class="options-row">
      <label class="remember-me">
        <input type="checkbox" id="rememberMe">
        Remember Session
      </label>
      <a href="#" class="forgot-link">Recover Access</a>
    </div>
    
    <button type="submit" class="btn-submit" id="submitBtn">
      <span class="btn-text">Log in</span>
    </button>
    
    <div class="error-msg" id="errorMsg">Authentication failed.</div>
  </form>
</div>

<script>
  function togglePassword() {
    const pwdInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    
    if (pwdInput.type === 'password') {
      pwdInput.type = 'text';
      eyeIcon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      `;
    } else {
      pwdInput.type = 'password';
      eyeIcon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      `;
    }
  }

  async function handleLogin(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    const btn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    
    btn.classList.add('loading');
    errorMsg.classList.remove('visible');
    
    try {
      // Typically the API runs on the same host, or we provide full URL
      const apiUrl = window.location.origin.includes('5000') || window.location.origin.includes('8000') 
        ? '/auth/login' 
        : 'http://localhost:8100/auth/login';

      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ username, password })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        // Store token based on remember me preference
        const storage = rememberMe ? localStorage : sessionStorage;
        storage.setItem('access_token', data.access_token);
        storage.setItem('user_role', data.role);
        
        // Ensure other storage is cleared
        if (rememberMe) {
          sessionStorage.removeItem('access_token');
          sessionStorage.removeItem('user_role');
        } else {
          localStorage.removeItem('access_token');
          localStorage.removeItem('user_role');
        }
        
        // Redirect to dashboard
        window.location.href = '/index.html';
      } else {
        errorMsg.textContent = data.detail || 'Authentication failed. Please check credentials.';
        errorMsg.classList.add('visible');
      }
    } catch (err) {
      console.error('Login error:', err);
      errorMsg.textContent = 'Connection error. Is the backend running?';
      errorMsg.classList.add('visible');
    } finally {
      btn.classList.remove('loading');
    }
  }
</script>

</body>
</html>
